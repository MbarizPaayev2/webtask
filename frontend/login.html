<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="title_login">Giriş — Aviakassa</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <nav class="auth-nav auth-nav--split">
      <div class="auth-nav__links">
        <a href="login.html" aria-current="page" data-i18n="nav_login">Giriş</a>
        <a href="register.html" data-i18n="nav_register">Qeydiyyat</a>
        <a href="aviakassa.html" data-i18n="nav_search">Uçuş axtar</a>
      </div>
      <div class="lang-switch" role="group" data-i18n-aria="lang_aria">
        <button type="button" class="lang-switch__btn is-active" data-set-lang="az" aria-pressed="true">AZ</button>
        <button type="button" class="lang-switch__btn" data-set-lang="ru" aria-pressed="false">RU</button>
        <button type="button" class="lang-switch__btn" data-set-lang="en" aria-pressed="false">EN</button>
      </div>
    </nav>

    <header class="site-header">
      <div class="site-header__logo">✈ Aviakassa</div>
      <p class="site-header__tagline" data-i18n="login_tagline">Hesaba daxil olun</p>
    </header>

    <main>
      <section class="card auth-card" aria-labelledby="login-title">
        <h2 id="login-title" class="card__title" data-i18n="login_heading">Giriş</h2>

        <div id="login-pg-result" class="login-pg-result" hidden></div>

        <p id="auth-message" class="form-msg form-grid--full-width" role="alert" aria-live="polite"></p>

        <form id="login-form" class="form-grid" novalidate>
          <div class="form-group form-grid--full-width">
            <label for="login-email" data-i18n="login_email_lbl">E-poçt</label>
            <input
              type="text"
              id="login-email"
              name="email"
              autocomplete="email"
              inputmode="email"
              data-i18n-placeholder="login_email_ph"
              placeholder="nümunə@mail.com"
              maxlength="254"
            />
            <span id="login-email-hint" class="auth-hint" aria-live="polite" data-i18n="auth_hint_email_ok">Düzgün e-poçt formatı</span>
          </div>
          <div class="form-group form-grid--full-width">
            <label for="login-password" data-i18n="login_pw_lbl">Parol</label>
            <input
              type="password"
              id="login-password"
              name="password"
              autocomplete="current-password"
              data-i18n-placeholder="login_pw_ph"
              placeholder="****"
              maxlength="256"
            />
          </div>
          <div class="form-group form-grid--full-width form-group--check">
            <div class="auth-check-row">
              <input type="checkbox" id="auth-relaxed-email" class="auth-check-row__input" />
              <label for="auth-relaxed-email" class="auth-check-row__label" data-i18n="login_relaxed">
                Korporativ iş e-poçtu istifadə edirəm (şirkət domeni üzrə ünvan)
              </label>
            </div>
          </div>
          <div class="form-group form-grid--full-width">
            <button type="submit" class="btn" data-i18n="login_submit">Daxil ol</button>
          </div>
        </form>

        <p class="auth-footer" data-i18n-html="login_footer_html">
          Hesabınız yoxdur? <a href="register.html">Qeydiyyat</a>
        </p>
      </section>
    </main>

    <footer class="page-footer">
      <p data-i18n="footer_copy">© Aviakassa</p>
    </footer>
  </div>

  <script src="lang.js"></script>
  <script src="auth.js"></script>
</body>
</html>
