<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giriş — Aviakassa</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Flask: layihə kökündən python backend/app.py — http://127.0.0.1:5000/login.html -->
  <div class="page">
    <nav class="auth-nav">
      <a href="login.html">Giriş</a>
      <a href="register.html">Qeydiyyat</a>
      <a href="aviakassa.html">Uçuş axtar</a>
    </nav>

    <header class="site-header">
      <div class="site-header__logo">✈ Aviakassa</div>
      <p class="site-header__tagline">Hesaba daxil olun</p>
    </header>

    <main>
      <section class="card auth-card" aria-labelledby="login-title">
        <h2 id="login-title" class="card__title">Giriş</h2>

        <div id="login-pg-result" class="login-pg-result" hidden></div>

        <p id="auth-message" class="form-msg form-grid--full-width" role="alert" aria-live="polite"></p>

        <form id="login-form" class="form-grid" novalidate>
          <div class="form-group form-grid--full-width">
            <label for="login-email">E-poçt</label>
            <input
              type="text"
              id="login-email"
              name="email"
              autocomplete="email"
              inputmode="email"
              placeholder="nümunə@mail.com"
              maxlength="254"
            />
            <span id="login-email-hint" class="auth-hint" aria-live="polite">Düzgün e-poçt formatı</span>
          </div>
          <div class="form-group form-grid--full-width">
            <label for="login-password">Parol</label>
            <input
              type="password"
              id="login-password"
              name="password"
              autocomplete="current-password"
              placeholder="****"
              maxlength="256"
            />
          </div>
          <div class="form-group form-grid--full-width form-group--check">
            <div class="auth-check-row">
              <input type="checkbox" id="auth-relaxed-email" class="auth-check-row__input" />
              <label for="auth-relaxed-email" class="auth-check-row__label">
                Korporativ iş e-poçtu istifadə edirəm (şirkət domeni üzrə ünvan)
              </label>
            </div>
          </div>
          <div class="form-group form-grid--full-width">
            <button type="submit" class="btn">Daxil ol</button>
          </div>
        </form>

        <p class="auth-footer">
          Hesabınız yoxdur? <a href="register.html">Qeydiyyat</a>
        </p>
      </section>
    </main>

    <footer class="page-footer">
      <p>© Aviakassa</p>
    </footer>
  </div>

  <script src="auth.js"></script>
</body>
</html>
